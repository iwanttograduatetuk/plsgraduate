spring:
  application:
    name: monitoring-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/predictive_maintenance}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

influxdb:
  url: ${INFLUXDB_URL:http://localhost:8086}
  token: ${INFLUXDB_TOKEN:my-token}
  org: ${INFLUXDB_ORG:predictive-maintenance}
  bucket: ${INFLUXDB_BUCKET:sensor-scores}

server:
  port: ${PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      service: monitoring-api
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    com.predictive: INFO

edge:
  # 엣지 에이전트 base URL 맵 (machine-id → URL)
  # 실제 배포 시 환경변수로 주입
  base-url: ${EDGE_BASE_URL:http://edge-agent:8000}
