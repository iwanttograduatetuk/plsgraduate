---
apiVersion: v1
kind: Namespace
metadata:
  name: predictive-maintenance
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: common-config
  namespace: predictive-maintenance
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka.kafka.svc.cluster.local:9092"
  INFLUXDB_URL: "http://influxdb.monitoring.svc.cluster.local:8086"
  INFLUXDB_ORG: "predictive-maintenance"
  INFLUXDB_BUCKET: "sensor-scores"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: predictive-maintenance
type: Opaque
stringData:
  postgres-url: "postgresql+asyncpg://postgres:postgres@postgres.predictive-maintenance.svc.cluster.local:5432/predictive_maintenance"
  postgres-jdbc-url: "jdbc:postgresql://postgres.predictive-maintenance.svc.cluster.local:5432/predictive_maintenance"
  postgres-user: "postgres"
  postgres-password: "postgres"
  influxdb-token: "my-token-change-in-production"
