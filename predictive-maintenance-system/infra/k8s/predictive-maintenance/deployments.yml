###############################################################################
# predictive-maintenance 네임스페이스 — 전체 마이크로서비스 Deployment
###############################################################################

# ── 1. telemetry-consumer ────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-consumer
  namespace: predictive-maintenance
  labels:
    app: telemetry-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemetry-consumer
  template:
    metadata:
      labels:
        app: telemetry-consumer
    spec:
      containers:
        - name: telemetry-consumer
          image: asia-northeast3-docker.pkg.dev/cnc-predictive/cnc-registry/telemetry-consumer:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: common-config
          env:
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: influxdb-token
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
# telemetry-consumer 스케일링 → keda-scaledobjects.yml (Kafka lag 기반)

# ── 2. anomaly-consumer ───────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-consumer
  namespace: predictive-maintenance
  labels:
    app: anomaly-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anomaly-consumer
  template:
    metadata:
      labels:
        app: anomaly-consumer
    spec:
      containers:
        - name: anomaly-consumer
          image: asia-northeast3-docker.pkg.dev/cnc-predictive/cnc-registry/anomaly-consumer:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: common-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: postgres-url
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
# anomaly-consumer 스케일링 → keda-scaledobjects.yml (Kafka lag 기반)

# ── 3. fault-diagnosis-service ───────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fault-diagnosis-service
  namespace: predictive-maintenance
  labels:
    app: fault-diagnosis-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fault-diagnosis-service
  template:
    metadata:
      labels:
        app: fault-diagnosis-service
    spec:
      containers:
        - name: fault-diagnosis-service
          image: asia-northeast3-docker.pkg.dev/cnc-predictive/cnc-registry/fault-diagnosis-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: common-config
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fault-diagnosis-service
  namespace: predictive-maintenance
spec:
  selector:
    app: fault-diagnosis-service
  ports:
    - port: 8001
      targetPort: 8001
# fault-diagnosis-service 스케일링 → keda-scaledobjects.yml (Kafka lag 기반)

# ── 4. notification-service ──────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: predictive-maintenance
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: asia-northeast3-docker.pkg.dev/cnc-predictive/cnc-registry/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: postgres-jdbc-url
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: postgres-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: postgres-password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/alerts/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: predictive-maintenance
spec:
  selector:
    app: notification-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: predictive-maintenance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

# ── 5. monitoring-api ────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-api
  namespace: predictive-maintenance
  labels:
    app: monitoring-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitoring-api
  template:
    metadata:
      labels:
        app: monitoring-api
    spec:
      containers:
        - name: monitoring-api
          image: asia-northeast3-docker.pkg.dev/cnc-predictive/cnc-registry/monitoring-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: postgres-jdbc-url
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: postgres-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: postgres-password
            - name: INFLUXDB_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: INFLUXDB_URL
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: influxdb-token
            - name: INFLUXDB_ORG
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: INFLUXDB_ORG
            - name: INFLUXDB_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: INFLUXDB_BUCKET
            - name: EDGE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: EDGE_BASE_URL
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-api
  namespace: predictive-maintenance
spec:
  selector:
    app: monitoring-api
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: monitoring-api-hpa
  namespace: predictive-maintenance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: monitoring-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

# ── 6. PostgreSQL StatefulSet ─────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: predictive-maintenance
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: predictive_maintenance
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: postgres-password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: predictive-maintenance
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
