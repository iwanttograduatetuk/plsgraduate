###############################################################################
# 로컬 통합 테스트 오버라이드
#
# 사용법 (infra/ 디렉터리에서):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# 변경사항:
#   - Kafka: 외부 IP → kafka:9092 (내부 브릿지)
#   - monitoring-api / notification-service: image → build (Gradle JAR 필요)
#   - monitoring-api: EDGE_BASE_URL 추가
#   - fault-diagnosis-service: MODEL_DIR → models_fd 경로
###############################################################################

services:

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    networks: [pm-net]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  # ── Grafana: iframe 허용 ──────────────────────────────────────────────────
  grafana:
    environment:
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"

  # ── Kafka: 내부 주소로 통일 ────────────────────────────────────────────────

  edge-agent:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  telemetry-consumer:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  anomaly-consumer:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  fault-diagnosis-service:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MODEL_DIR: /app/models_fd
    volumes:
      - ../../expert_graph:/app/expert_graph:ro
      - ../cloud/fault-diagnosis-service/models_fd:/app/models_fd:ro

  # ── Spring Boot: image → build ────────────────────────────────────────────

  notification-service:
    image: ""                           # override image 무효화
    build:
      context: ../cloud/notification-service
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_URL: jdbc:postgresql://postgres:5432/predictive_maintenance
      DB_USER: postgres
      DB_PASS: postgres

  monitoring-api:
    image: ""                           # override image 무효화
    build:
      context: ../cloud/monitoring-api
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/predictive_maintenance
      DB_USER: postgres
      DB_PASS: postgres
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: my-token
      INFLUXDB_ORG: predictive-maintenance
      INFLUXDB_BUCKET: sensor-scores
      EDGE_BASE_URL: http://edge-agent:8000
